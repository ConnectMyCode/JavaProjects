# Server (from env: SERVER_PORT, default 8080)
server.port=${SERVER_PORT:8080}

# Database (from env: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:support_tickets}
spring.datasource.username=${DB_USER:support_user}
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto = none 
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT (from env: JWT_SECRET, JWT_EXPIRATION_MS)
app.jwt.secret=${JWT_SECRET:change-this-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# AI (from env: AI_PROVIDER_BASE_URL, AI_PROVIDER_API_KEY, AI_MODEL)
app.ai.base-url=${AI_PROVIDER_BASE_URL:https://api.openai.com/v1}
app.ai.api-key=${AI_PROVIDER_API_KEY:}
app.ai.model=${AI_MODEL:gpt-4.1-mini}
