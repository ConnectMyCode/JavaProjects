# Server (from env: SERVER_PORT, default 8080)
server.port=8080

# Database (from env: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD)
spring.datasource.url=jdbc:postgresql://localhost:5432/support_tickets
spring.datasource.username=support_user
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true


# JWT (from env: JWT_SECRET, JWT_EXPIRATION_MS)
app.jwt.secret=my-super-secret-key-123456789-very-long-secure-key
app.jwt.expiration-ms=3600000

# AI (from env: AI_PROVIDER_BASE_URL, AI_PROVIDER_API_KEY, AI_MODEL)
app.ai.base-url=https://api.openai.com/v1
app.ai.api-key=placeholder
app.ai.model=gpt-4.1-mini
ai.provider.api.key=
ai.model=gpt-40-mini
